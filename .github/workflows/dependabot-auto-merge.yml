name: Dependabot auto-merge

# Two phases so a red CI can never auto-merge a Dependabot PR without relying on
# a branch-protection required check (which also blocked the release workflow's
# push to main):
#   1. On the PR, approve patch/minor bumps (approval alone never merges).
#   2. After the CI workflow finishes successfully for that PR, merge it, and
#      only if it carries our approval, so majors (never approved) never merge.
on:
  pull_request:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  approve:
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
      - name: Approve patch and minor bumps
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  merge:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Merge the approved Dependabot PR for this green CI run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          PR=$(gh pr list --repo "$REPO" --head "$HEAD" --state open --json number,reviewDecision --jq '.[0]')
          if [ -z "$PR" ]; then echo "No open PR for $HEAD; nothing to merge."; exit 0; fi
          NUMBER=$(echo "$PR" | jq -r '.number')
          DECISION=$(echo "$PR" | jq -r '.reviewDecision')
          if [ "$DECISION" != "APPROVED" ]; then
            echo "PR #$NUMBER not approved (decision: $DECISION); skipping. Majors are never approved.";
            exit 0;
          fi
          gh pr merge --squash --delete-branch "$NUMBER" --repo "$REPO"
